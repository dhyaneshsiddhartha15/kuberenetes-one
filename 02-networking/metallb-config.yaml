# MetalLB IP Address Pool configuration
# IMPORTANT: Edit the addresses below to match your LAN!
#
# To find your LAN range:
#   ip route | grep default
#
# Example output: default via 192.168.1.1 dev eth0
# Your LAN is: 192.168.1.0/24
# Choose IPs from that range that are NOT assigned by DHCP

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  # CHANGE THIS to match your network!
  addresses:
  - 192.168.1.200-192.168.1.220
  # You can also add IPv6 addresses:
  # - 2001:db8::200-2001:db8::220

---
# L2 Advertisement advertises the IP pool using ARP/NDP
# This is the simplest mode for home labs and small clusters

apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default
  namespace: metallb-system
spec:
  ipAddressPools:
  - default-pool
