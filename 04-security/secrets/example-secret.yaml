# ⚠️  WARNING: This is an example of a plain Kubernetes Secret
# DO NOT commit this to Git! The values are base64-encoded, not encrypted.
# Anyone with access to this file can decode the secrets.
#
# To decode: echo "dmFsdWU=" | base64 -d
#
# For Git-safe secrets, use Sealed Secrets (see sealed-secret-install.sh)

apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: myapp
type: Opaque
data:
  # Base64-encoded values
  # These are examples - replace with your own encoded values
  database-url: ZGF0YWJhc2U6Ly91c2VyOnBhc3NAZGI6NTQzMg==  # database://user:pass@db:5432
  api-key: YWJjMTIzNDU2Nzg5MA==  # abcdefg1234567890
