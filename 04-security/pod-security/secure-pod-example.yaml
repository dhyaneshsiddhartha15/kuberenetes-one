# Example of a securely configured pod
# Follows the restricted Pod Security Standard

apiVersion: v1
kind: Pod
metadata:
  name: secure-pod-example
  namespace: myapp
spec:
  # Security context at pod level
  securityContext:
    # Don't run as root
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    # File system group
    fsGroup: 1000
    # Seccomp profile
    seccompProfile:
      type: RuntimeDefault
    # Don't allow privilege escalation
    # (This is also set at container level)
  containers:
  - name: secure-container
    image: nginx:alpine
    securityContext:
      # Drop all capabilities
      capabilities:
        drop:
        - ALL
      # Prevent privilege escalation
      allowPrivilegeEscalation: false
      # Read-only root filesystem
      readOnlyRootFilesystem: true
      # Don't run as root
      runAsNonRoot: true
      runAsUser: 1000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    volumeMounts:
    # Need tmp dir for read-only root filesystem
    - name: tmp
      mountPath: /tmp
    - name: cache
      mountPath: /var/cache/nginx
    - name: run
      mountPath: /var/run
  volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}
  - name: run
    emptyDir: {}
