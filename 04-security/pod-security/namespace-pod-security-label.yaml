# Apply Pod Security Admission labels to namespaces
# This enforces security profiles for pods created in the namespace

apiVersion: v1
kind: Namespace
metadata:
  name: myapp
  labels:
    # Enforce restricted security profile
    pod-security.kubernetes.io/enforce: restricted
    # Warn for baseline issues
    pod-security.kubernetes.io/warn: baseline
    # Audit mode - log violations but don't block
    pod-security.kubernetes.io/audit: restricted
---
# Example: Privileged namespace for system components
apiVersion: v1
kind: Namespace
metadata:
  name: system-components
  labels:
    # Allow privileged pods (use sparingly!)
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
---
# Example: Baseline namespace for less strict requirements
apiVersion: v1
kind: Namespace
metadata:
  name: dev-environment
  labels:
    # Enforce baseline (less strict than restricted)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
