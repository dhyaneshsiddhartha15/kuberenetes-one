# Read-only service account for monitoring tools
# Useful for Prometheus, Grafana, etc.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: readonly-sa
  namespace: myapp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: readonly-role
  namespace: myapp
rules:
- apiGroups: [""]
  resources: ["configmaps", "endpoints", "pods", "replicationcontrollers", "services", "limitranges"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["cronjobs", "jobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: readonly-binding
  namespace: myapp
subjects:
- kind: ServiceAccount
  name: readonly-sa
  namespace: myapp
roleRef:
  kind: Role
  name: readonly-role
  apiGroup: rbac.authorization.k8s.io
