# ⚠️  WARNING: Use with extreme caution!
# This grants admin access within a namespace, NOT cluster-wide
# For namespace-specific admin, use Role + RoleBinding (not ClusterRole + ClusterRoleBinding)

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: namespace-admin
  namespace: myapp
rules:
# Full access to all resources in this namespace
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: namespace-admin-binding
  namespace: myapp
subjects:
# Only give this to trusted users!
- kind: User
  name: admin@example.com
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: namespace-admin
  apiGroup: rbac.authorization.k8s.io

---
# ⚠️  DANGER: ClusterRoleBinding gives cluster-wide access!
# NEVER grant cluster-admin to regular users!
# This is shown only as a warning example of what NOT to do for regular users.

