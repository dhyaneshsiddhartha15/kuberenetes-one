# Bind the developer role to users/groups
# Edit the subjects to match your users

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-binding
  namespace: myapp
subjects:
# Add users here
- kind: User
  name: developer@example.com
  apiGroup: rbac.authorization.k8s.io

# You can also add groups
# - kind: Group
#   name: developers
#   apiGroup: rbac.authorization.k8s.io

# Or service accounts
# - kind: ServiceAccount
#   name: build-bot
#   namespace: myapp

roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io
