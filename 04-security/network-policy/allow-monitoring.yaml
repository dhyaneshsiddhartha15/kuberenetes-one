# Allow Prometheus to scrape metrics from pods
# Required if using kube-prometheus-stack

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring
  namespace: myapp
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    # Allow from monitoring namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
    ports:
    - protocol: TCP
      port: 8000  # Backend metrics port
