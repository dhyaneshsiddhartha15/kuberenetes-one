# Allow ingress-nginx to reach all pods
# Required for ingress to work with network policies

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: myapp
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    # Allow from ingress-nginx pods
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    # Allow from ingress-nginx controller (alternative label)
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/component: controller
