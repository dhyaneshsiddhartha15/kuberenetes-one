<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App - Kubernetes Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .k8s-badge {
            display: inline-block;
            background: #326ce5;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
        }

        .status-card.loading {
            border-left-color: #ffc107;
        }

        .status-card.error {
            border-left-color: #dc3545;
        }

        .status-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .status-content {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .status-content pre {
            background: #f1f3f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .btn {
            background: #326ce5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: #2654c7;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(50, 108, 229, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9rem;
        }

        .footer a {
            color: #326ce5;
            text-decoration: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #326ce5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .connection-diagram {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .diagram-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .diagram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .diagram-box {
            background: white;
            border: 2px solid #326ce5;
            border-radius: 8px;
            padding: 10px 15px;
            font-weight: 600;
            color: #326ce5;
        }

        .diagram-arrow {
            color: #999;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 My App</h1>
        <p class="subtitle">Deployed on Kubernetes</p>

        <span class="k8s-badge">Kubernetes from Zero</span>

        <div id="status" class="status-card loading">
            <div class="status-title">
                <span class="spinner"></span>
                Connecting to Backend...
            </div>
            <div class="status-content">
                Checking if the backend API is reachable...
            </div>
        </div>

        <button class="btn" onclick="fetchBackendData()">Refresh Connection</button>

        <div class="connection-diagram">
            <div class="diagram-title">Architecture:</div>
            <div class="diagram">
                <div class="diagram-box">Frontend</div>
                <span class="diagram-arrow">→</span>
                <div class="diagram-box">Ingress</div>
                <span class="diagram-arrow">→</span>
                <div class="diagram-box">Backend API</div>
            </div>
        </div>

        <div class="footer">
            Built by <a href="https://github.com/dhyanesh-siddhartha" target="_blank">Dhyanesh Siddhartha</a>
            <br>
            Learning Kubernetes in 2026 🎉
        </div>
    </div>

    <script>
        async function fetchBackendData() {
            const statusDiv = document.getElementById('status');

            // Show loading state
            statusDiv.className = 'status-card loading';
            statusDiv.innerHTML = `
                <div class="status-title">
                    <span class="spinner"></span>
                    Connecting to Backend...
                </div>
                <div class="status-content">
                    Fetching data from /api/hello endpoint...
                </div>
            `;

            try {
                // Call the backend API
                const response = await fetch('/api/hello');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                // Show success state
                statusDiv.className = 'status-card';
                statusDiv.innerHTML = `
                    <div class="status-title">✅ Backend Connected!</div>
                    <div class="status-content">
                        <strong>Message:</strong> ${data.message}<br>
                        <strong>Environment:</strong> ${data.environment}<br>
                        <strong>Timestamp:</strong> ${data.timestamp}
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;

            } catch (error) {
                // Show error state
                statusDiv.className = 'status-card error';
                statusDiv.innerHTML = `
                    <div class="status-title">❌ Connection Failed</div>
                    <div class="status-content">
                        <strong>Error:</strong> ${error.message}<br><br>
                        <strong>Troubleshooting:</strong><br>
                        • Check if backend pods are running<br>
                        • Verify Ingress routing rules<br>
                        • Check Service endpoints
                        <pre style="color: #dc3545;">kubectl get pods -n myapp
kubectl get svc -n myapp
kubectl get ingress -n myapp</pre>
                    </div>
                `;
            }
        }

        // Fetch data on page load
        document.addEventListener('DOMContentLoaded', fetchBackendData);

        // Auto-refresh every 30 seconds
        setInterval(fetchBackendData, 30000);
    </script>
</body>
</html>
